baseURL = 'https://mcp-steroid.jonnyzzz.com/'
languageCode = 'en-us'
title = 'MCP Steroid - Reliable code changes for your AI Agent'
disableKinds = ['taxonomy', 'term']

# Two static roots, merged by Hugo: checked-in assets (static/) + the generator output
# (build/generated-static/, written by `:website-gen:generateWebsite` — version.json, updatePlugins.xml,
# install.sh, install.ps1, EULA, LICENSE). The build/ dir is gitignored, so generated files never land in
# the tracked source tree and adding a new one needs no .gitignore edit.
staticDir = ['static', 'build/generated-static']

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[menus]
  [[menus.main]]
    name = "Home"
    url = "/"
    weight = 1
  [[menus.main]]
    name = "Docs"
    url = "/docs/"
    weight = 2
  [[menus.main]]
    name = "Releases"
    url = "/releases/"
    weight = 3
  [[menus.main]]
    name = "Strategy"
    url = "/docs/strategy/"
    weight = 4
  [[menus.main]]
    name = "PoC & Support"
    url = "/#support"
    weight = 5
  [[menus.main]]
    name = "Discord"
    url = "https://discord.gg/e9qgQ7NeTC"
    weight = 6
  [[menus.main]]
    name = "GitHub"
    url = "https://github.com/jonnyzzz/mcp-steroid"
    weight = 7

[params]
  description = "MCP Steroid makes your AI Agent change code with fewer cleanup loops. It gives the Agent the same semantic actions a JetBrains IDE gives humans — typed refactors, inspections, debugger, test runs — so the Agent finishes in fewer attempts and you spend less time verifying its output. Ships today as a JetBrains IDE plugin."
  playlistUrl = "https://www.youtube.com/playlist?list=PLitZWClhc4Qgz3w8qrtctMR_lpIc81n0f"
  githubUrl = "https://github.com/jonnyzzz/mcp-steroid"
  githubIssuesUrl = "https://github.com/jonnyzzz/mcp-steroid/issues"
  youtubeChannel = "https://youtube.com/@jonnyzzz"
  # Version is read from ../VERSION file during build (see Makefile)
  version = "0.100"

