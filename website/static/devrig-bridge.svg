<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320" role="img" aria-label="One devrig bridge connects your AI Agent to all running IDEs at once" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#9a8cff"/></marker>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#6B57FF"/><stop offset="1" stop-color="#FE2857"/></linearGradient>
  </defs>
  <rect x="0" y="0" width="760" height="320" rx="14" fill="#16162b"/>
  <rect x="14" y="118" width="150" height="84" rx="10" fill="#1f1f3a" stroke="#3a3a5c"/>
  <text x="89" y="150" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="700">AI Agent</text>
  <text x="89" y="172" text-anchor="middle" fill="#b0b0c0" font-size="10.5">Claude · Codex · Gemini · …</text>
  <line x1="164" y1="160" x2="290" y2="160" stroke="#9a8cff" stroke-width="2" marker-end="url(#arr)"/>
  <text x="227" y="151" text-anchor="middle" fill="#b0b0c0" font-size="11">CLI · MCP</text>
  <rect x="294" y="110" width="150" height="100" rx="10" fill="#1f1f3a" stroke="url(#brand)" stroke-width="2.5"/>
  <text x="369" y="148" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="700">devrig</text>
  <text x="369" y="170" text-anchor="middle" fill="#b0b0c0" font-size="11">CLI + MCP bridge</text>
  <text x="369" y="186" text-anchor="middle" fill="#b0b0c0" font-size="11">→ every IDE</text>
  <text x="505" y="34" text-anchor="middle" fill="#b0b0c0" font-size="10.5">discovers &amp; routes to all running IDEs at once</text>
  <rect x="566" y="44" width="180" height="64" rx="10" fill="#1f1f3a" stroke="#3a3a5c"/>
  <text x="656" y="71" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="600">IntelliJ IDEA</text>
  <text x="656" y="91" text-anchor="middle" fill="#b0b0c0" font-size="11">project A</text>
  <rect x="566" y="128" width="180" height="64" rx="10" fill="#1f1f3a" stroke="#3a3a5c"/>
  <text x="656" y="155" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="600">PyCharm</text>
  <text x="656" y="175" text-anchor="middle" fill="#b0b0c0" font-size="11">project B</text>
  <rect x="566" y="212" width="180" height="64" rx="10" fill="#1f1f3a" stroke="#3a3a5c" stroke-dasharray="4 3"/>
  <text x="656" y="239" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="600">Managed backend</text>
  <text x="656" y="259" text-anchor="middle" fill="#b0b0c0" font-size="11">started by devrig</text>
  <path d="M444,140 C512,108 522,80 564,77" fill="none" stroke="#9a8cff" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="444" y1="160" x2="564" y2="160" stroke="#9a8cff" stroke-width="2" marker-end="url(#arr)"/>
  <path d="M444,180 C512,212 522,240 564,244" fill="none" stroke="#9a8cff" stroke-width="2" marker-end="url(#arr)"/>
</svg>
