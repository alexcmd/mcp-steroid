#
# Pinning the Gradle daemon JVM to Java 25 means the daemon no longer inherits
# whatever JVM happens to be on PATH / JAVA_HOME. All project modules target
# JDK 25 via `kotlin { jvmToolchain(25) }` to match IntelliJ IDEA 2026.1
# (build 261), whose bundled JBR is JDK 25 — see docs/262-EAP-PLAN.md and the
# floor bump in commit 663ba2cb. Aligning the daemon itself removes a class
# of "works on CI, not locally" surprises from JVM / Kotlin version skew.
#
# Local JDK 25 gets auto-discovered from the usual install roots
# (~/Library/Java/JavaVirtualMachines, /Library/Java/JavaVirtualMachines, …).
# When no compatible JDK is found locally, the daemon-JVM provisioning
# service downloads one from the URL pinned per (OS, arch) below.
#
# Important: the foojay-resolver-convention plugin in settings.gradle.kts is
# scoped to PROJECT toolchain resolution (`kotlin { jvmToolchain(25) }`). It
# does NOT register URLs for the daemon-JVM provisioning service, which has
# its own toolchain-URL map keyed on (OS, arch). Without an explicit
# `toolchainUrl.<OS>.<ARCH>` entry, Gradle errors out with:
#
#   Unable to download toolchain matching the requirements
#   ({languageVersion=25, …}) from 'null', due to: No defined toolchain
#   download url for LINUX on x86_64 architecture.
#
# Adoptium Temurin 25.0.3+9 is the LTS GA release; the URLs below are stable
# until Eclipse Adoptium publishes the next 25.0.x point release. When the
# next 25.0.x lands (typically every 3 months), update the version + the hash
# in the URLs. Until TeamCity agents add JDK 25 to their preinstalled tool
# bundle, this is what makes CI builds work without per-agent provisioning.
#
# See https://docs.gradle.org/current/userguide/gradle_daemon.html#sec:daemon_jvm_criteria
#
toolchainVersion=25

# Adoptium Temurin 25.0.3+9 LTS GA — Linux x86_64.
# Source: https://adoptium.net/temurin/releases/?version=25
toolchainUrl.LINUX.X86_64=https://github.com/adoptium/temurin25-binaries/releases/download/jdk-25.0.3+9/OpenJDK25U-jdk_x64_linux_hotspot_25.0.3_9.tar.gz

# Adoptium Temurin 25.0.3+9 LTS GA — Linux aarch64.
toolchainUrl.LINUX.AARCH64=https://github.com/adoptium/temurin25-binaries/releases/download/jdk-25.0.3+9/OpenJDK25U-jdk_aarch64_linux_hotspot_25.0.3_9.tar.gz

# Adoptium Temurin 25.0.3+9 LTS GA — macOS aarch64 (Apple Silicon).
toolchainUrl.MAC_OS.AARCH64=https://github.com/adoptium/temurin25-binaries/releases/download/jdk-25.0.3+9/OpenJDK25U-jdk_aarch64_mac_hotspot_25.0.3_9.tar.gz

# Adoptium Temurin 25.0.3+9 LTS GA — macOS x86_64 (Intel).
toolchainUrl.MAC_OS.X86_64=https://github.com/adoptium/temurin25-binaries/releases/download/jdk-25.0.3+9/OpenJDK25U-jdk_x64_mac_hotspot_25.0.3_9.tar.gz

# Adoptium Temurin 25.0.3+9 LTS GA — Windows x86_64.
toolchainUrl.WINDOWS.X86_64=https://github.com/adoptium/temurin25-binaries/releases/download/jdk-25.0.3+9/OpenJDK25U-jdk_x64_windows_hotspot_25.0.3_9.zip
