org.gradle.jvmargs=-Xmx2048m
org.gradle.caching=true

# kotlinx pins for modules that link into the ij-plugin runtime classpath.
# At runtime the IDE classloader serves the bundled `intellij.libraries.kotlinx.*.jar`
# variants; these values must equal the BASE version of what IDE 261 ships
# (after stripping the JetBrains `-intellij-N` fork suffix for coroutines).
# Enforced by `:ij-plugin:test` -> `KotlinxBundledVersionTest` against every
# entry in `McpSteroidIdeTargets.verifierTargets`.
mcp.kotlinx.coroutines.version=1.10.2
mcp.kotlinx.serialization.version=1.9.0
